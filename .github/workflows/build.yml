name: Build Tracker Rules

on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tracker rules
        run: |
          curl -sL https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all.txt -o /tmp/ng_all.txt
          curl -sL https://raw.githubusercontent.com/ngosang/trackerslist/master/trackers_all_ip.txt -o /tmp/ng_ip.txt
          curl -sL https://raw.githubusercontent.com/XIU2/TrackersListCollection/master/all.txt -o /tmp/xiu_all.txt

          python3 << 'EOF'
          import re

          files = ['/tmp/ng_all.txt', '/tmp/ng_ip.txt', '/tmp/xiu_all.txt']
          domains = set()
          ips = set()

          for f in files:
              with open(f) as fp:
                  for line in fp:
                      line = line.strip()
                      if not line:
                          continue
                      m = re.match(r'(?:udp|http|https|ws|wss)://([^/:]+)', line)
                      if not m:
                          continue
                      host = m.group(1)
                      if re.match(r'^\d+\.\d+\.\d+\.\d+$', host):
                          ips.add(host)
                      elif '.' in host and not host.startswith('['):
                          domains.add(host)

          mkdir = __import__('os').makedirs
          mkdir('rules', exist_ok=True)

          with open('rules/tracker-domain.yaml', 'w') as f:
              f.write('payload:\n')
              for d in sorted(domains):
                  f.write(f'  - {d}\n')

          with open('rules/tracker-ip.yaml', 'w') as f:
              f.write('payload:\n')
              for ip in sorted(ips):
                  f.write(f'  - {ip}/32\n')

          print(f'Domains: {len(domains)}, IPs: {len(ips)}')
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/
          git diff --staged --quiet || git commit -m "Auto update tracker rules $(date '+%Y-%m-%d')"
          git push
